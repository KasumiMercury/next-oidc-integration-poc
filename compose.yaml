services:
    hydra-migrate:
        image: oryd/hydra:v26.2.0
        user: "${UID:-1000}:${GID:-1000}"
        environment:
            DSN: sqlite:///var/lib/sqlite/db.sqlite?_fk=true
        volumes:
            - ./data/hydra:/var/lib/sqlite
        command: migrate sql up -e --yes
        restart: "no"

    hydra:
        image: oryd/hydra:v26.2.0
        user: "${UID:-1000}:${GID:-1000}"
        depends_on:
            hydra-migrate:
                condition: service_completed_successfully
        ports:
            - "4444:4444"
            - "4445:4445"
        environment:
            DSN: sqlite:///var/lib/sqlite/db.sqlite?_fk=true
            URLS_SELF_ISSUER: http://localhost:4444
            URLS_CONSENT: http://localhost:3000/consent
            URLS_LOGIN: http://localhost:3000/login
            URLS_LOGOUT: http://localhost:3000/logout
            SECRETS_SYSTEM: this-is-a-development-only-secret-please-replace-it
            OIDC_SUBJECT_IDENTIFIERS_SUPPORTED_TYPES: public,pairwise
            OIDC_SUBJECT_IDENTIFIERS_PAIRWISE_SALT: development-only-pairwise-salt
            LOG_LEVEL: debug
            LOG_LEAK_SENSITIVE_VALUES: "true"
            SERVE_COOKIES_SAME_SITE_MODE: Lax
        volumes:
            - ./data/hydra:/var/lib/sqlite
        command: serve all --dev
        restart: unless-stopped

    hydra-setup:
        image: alpine:3.20
        depends_on:
            hydra:
                condition: service_started
        environment:
            HYDRA_ADMIN_URL: http://hydra:4445
            OIDC_CLIENT_ID: front-poc-client
            OIDC_CLIENT_SECRET: front-poc-secret-please-replace
            OIDC_REDIRECT_URI: http://localhost:3000/api/auth/callback
            OIDC_POST_LOGOUT_REDIRECT_URI: http://localhost:3000/
            OIDC_SCOPE: "openid offline_access profile email"
        entrypoint:
            - /bin/sh
            - -c
            - |
                set -e
                apk add --no-cache curl jq >/dev/null
                echo "Waiting for Hydra admin API..."
                until curl -fs "$$HYDRA_ADMIN_URL/health/ready" >/dev/null; do sleep 1; done
                body=$$(jq -n \
                  --arg id "$$OIDC_CLIENT_ID" \
                  --arg secret "$$OIDC_CLIENT_SECRET" \
                  --arg redirect "$$OIDC_REDIRECT_URI" \
                  --arg logout "$$OIDC_POST_LOGOUT_REDIRECT_URI" \
                  --arg scope "$$OIDC_SCOPE" \
                  '{
                    client_id: $$id,
                    client_secret: $$secret,
                    client_name: "front-poc",
                    grant_types: ["authorization_code", "refresh_token"],
                    response_types: ["code"],
                    scope: $$scope,
                    redirect_uris: [$$redirect],
                    post_logout_redirect_uris: [$$logout],
                    token_endpoint_auth_method: "client_secret_post",
                    skip_consent: true,
                    skip_logout_consent: true
                  }')
                if curl -fs "$$HYDRA_ADMIN_URL/admin/clients/$$OIDC_CLIENT_ID" >/dev/null 2>&1; then
                    echo "Updating existing client: $$OIDC_CLIENT_ID"
                    curl -fs -X PUT "$$HYDRA_ADMIN_URL/admin/clients/$$OIDC_CLIENT_ID" \
                        -H 'content-type: application/json' \
                        -d "$$body" >/dev/null
                else
                    echo "Creating client: $$OIDC_CLIENT_ID"
                    curl -fs -X POST "$$HYDRA_ADMIN_URL/admin/clients" \
                        -H 'content-type: application/json' \
                        -d "$$body" >/dev/null
                fi
                echo "Done."
        restart: "no"

    front:
        build:
            context: ./front
            dockerfile: Dockerfile
        depends_on:
            hydra-setup:
                condition: service_completed_successfully
        ports:
            - "3000:3000"
        environment:
            NODE_ENV: development
            APP_URL: http://localhost:3000
            HYDRA_PUBLIC_URL: http://hydra:4444
            HYDRA_ADMIN_URL: http://hydra:4445
            HYDRA_SERVER_URL: http://hydra:4444
            OIDC_ISSUER_URL: http://localhost:4444
            OIDC_CLIENT_ID: front-poc-client
            OIDC_CLIENT_SECRET: front-poc-secret-please-replace
            OIDC_REDIRECT_URI: http://localhost:3000/api/auth/callback
            OIDC_SCOPE: "openid offline_access profile email"
            SESSION_SECRET: dev-only-iron-session-secret-please-replace-32+chars
        develop:
            watch:
                - action: sync
                  path: ./front
                  target: /app
                  ignore:
                      - node_modules/
                      - .next/
                      - .git/
                - action: rebuild
                  path: ./front/package.json
                - action: rebuild
                  path: ./front/pnpm-lock.yaml
        restart: unless-stopped
